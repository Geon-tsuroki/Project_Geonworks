<div class="titleArea">
   <div class="title">
        <h2>BUSINESS INQUIRY</h2>
        <p>저희 GEONWORKS에 관심을 가져주셔서 감사합니다.</p>
        <p>아래 양식에 맞추어 내용을 채워주십시오.</p>
   </div>
</div>

<div id="form-wrapper">
    <div class="form-grid">
        <div class="form-group">
            <label for="inquirerName">Company / Name <span class="required"></span></label>
            <input type="text" id="inquirerName" placeholder="회사명 또는 성함을 입력해주세요." required>
        </div>

        <div class="form-group">
            <label for="inquirerEmail">Email Address <span class="required"></span></label>
            <input type="email" id="inquirerEmail" placeholder="example@domain.com" required>
        </div>

        <div class="form-group full-width">
            <label for="inquirerSubject">Subject <span class="required"></span></label>
            <input type="text" id="inquirerSubject" placeholder="문의 제목을 입력해주세요." required>
        </div>

        <div class="form-group full-width">
            <label for="inquirerMessage">Message <span class="required"></span></label>
            <textarea id="inquirerMessage" rows="10" placeholder="문의하고자 하시는 내용을 작성하여 주십시오." required></textarea>
        </div>
        
        <button type="button" id="submit" name="submit" class="submit-btn">SUBMIT</button>
        
    </div>
    <div class="right">
        <img src="/customhtml/business/images/geonsymbol.svg">
        <p>WE OFFER A PRODUCT ONLY FOR YOU</p>
        <p>언제나 여러분들만의 키보드를 제공하는 GEONWORKS가 되겠습니다.</p>
    </div>
</div>
